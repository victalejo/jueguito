<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#04121a" />
    <title>Evolución — del átomo a la célula</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #04121a;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      /* Loading splash shown until Phaser boots */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: #7fe3c0;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 13px;
        background: radial-gradient(circle at 50% 40%, #0a2230 0%, #04121a 70%);
        transition: opacity 0.4s ease;
        z-index: 10;
      }
      #boot .dot {
        width: 46px; height: 46px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #aeffe0, #2bb98a 55%, #0c5c46);
        box-shadow: 0 0 30px #2bb98a99;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.82); opacity: 0.65; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      #boot.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="boot"><div class="dot"></div><span>Iniciando caldo primigenio…</span></div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
